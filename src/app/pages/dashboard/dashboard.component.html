<div class="container">
  <header class="header">
    <h1>Remote Awake</h1>
  </header>

  <mat-tab-group class="tabs" [selectedIndex]="0" (selectedIndexChange)="onTabChange($event)">
    <mat-tab label="Inicio"></mat-tab>
    <mat-tab label="Configuración"></mat-tab>
    <mat-tab label="Favoritos"></mat-tab>
  </mat-tab-group>

  <div class="content">
    <h2 class="title">Alarmas para mañana</h2>
    
    <div class="alarms-container">
      <div class="alarm-column">
        <h3>Alarma principal con respaldos</h3>
        <p class="event-name">Reunión Cliente</p>
        
        <div class="alarm-item">
          <mat-checkbox color="primary" [checked]="true"></mat-checkbox>
          <span class="time">4:30 AM</span>
        </div>
        
        <div class="alarm-item">
          <mat-checkbox color="primary" [checked]="true"></mat-checkbox>
          <span class="time">4:35 AM</span>
        </div>
        
        <div class="alarm-item">
          <mat-checkbox color="primary" [checked]="true"></mat-checkbox>
          <span class="time">4:35 AM</span>
        </div>
      </div>

      <mat-divider [vertical]="true" class="divider"></mat-divider>

      <div class="alarm-column">
        <h3>Alarma con Anti-snooze</h3>
        <p class="event-name">Pairing</p>
        
        <div class="alarm-item">
          <mat-checkbox color="primary" [checked]="true"></mat-checkbox>
          <span class="time">5:00 AM</span>
        </div>
      </div>

      <mat-divider [vertical]="true" class="divider"></mat-divider>

      <div class="alarm-column">
        <h3>Alarma normal</h3>
        <p class="event-name">Daily</p>
        
        <div class="alarm-item">
          <mat-checkbox color="primary" [checked]="true"></mat-checkbox>
          <span class="time">6:00 AM</span>
        </div>
      </div>
    </div>

    <button mat-fab extended color="primary" class="link-button" (click)="onVincularCalendario()">
      Vincular otro Calendario
    </button>
  </div>
</div>
