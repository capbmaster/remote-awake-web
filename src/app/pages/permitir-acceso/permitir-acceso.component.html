<div class="container">
  <header class="header">
    <h1>Remote Awake</h1>
  </header>

  <mat-tab-group class="tabs" [selectedIndex]="0" (selectedIndexChange)="onTabChange($event)">
    <mat-tab label="Inicio"></mat-tab>
    <mat-tab label="Configuración"></mat-tab>
    <mat-tab label="Favoritos"></mat-tab>
  </mat-tab-group>

  <div class="content">
    <div class="cards-layout">
      <div class="card card-permission">
        <div class="card-icon">
          <mat-icon>lock_open</mat-icon>
        </div>
        <h2 class="card-title">Permitir acceso a Remote Awake</h2>
        <p class="card-description">
          Autoriza la conexión para sincronizar tus eventos y configurar alarmas desde tu calendario.
        </p>
      </div>

      <div class="card card-select">
        <h3 class="card-subtitle">Seleccione</h3>
        <div class="options-list">
          <label class="option-item">
            <mat-checkbox [(ngModel)]="calendarioChecked" color="primary">
              Calendario
            </mat-checkbox>
          </label>
          <label class="option-item">
            <mat-checkbox [(ngModel)]="horaChecked" color="primary">
              Hora
            </mat-checkbox>
          </label>
        </div>
        <div class="card-actions">
          <button class="btn btn-deny" (click)="onDenegar()">Denegar</button>
          <button class="btn btn-allow" (click)="onPermitir()">Permitir</button>
        </div>
      </div>
    </div>
  </div>
</div>
